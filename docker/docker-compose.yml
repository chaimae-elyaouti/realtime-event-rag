services:
  # -------------------------------------------------------------------------------
  # APACHE KAFKA: Event Broker configured in lightweight KRaft Mode (No Zookeeper)
  # -------------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: production_event_broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_ENABLE_KRAFT: 'true'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT' 
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      KAFKA_OPTS: "-Xms256M -Xmx256M"
    mem_limit: 400m

  # -------------------------------------------------------------------------------
  # CHROMADB: Production Vector Database Server Instance 
  # -------------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:0.5.3
    container_name: production_vector_store
    ports:
      - "8000:8000"
    volumes:
      - ../data/vector_db:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSISTENT_DIRECTORY=/chroma/chroma
    mem_limit: 300m